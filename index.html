<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书 AI 自动发布工具</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #ff2442;
            --primary-hover: #ff4d6a;
            --bg: #f8f9fb;
            --card-bg: #ffffff;
            --text-main: #2c2c2c;
            --text-muted: #8e8e93;
            --border: #eef0f4;
            --shadow-sm: 0 4px 16px rgba(11, 20, 26, 0.04);
            --shadow-md: 0 8px 32px rgba(11, 20, 26, 0.08);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #root {
            width: 100%;
            min-height: 100vh;
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 2.5rem 1.5rem;
            border-right: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.02);
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            padding: 0 10px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), #ff6b81);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 4px 12px rgba(255, 36, 66, 0.3);
        }

        .sidebar h2 {
            font-size: 1.25rem;
            margin: 0;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-item {
            padding: 1rem 1.2rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-item.active {
            background: rgba(255, 36, 66, 0.08);
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item:hover:not(.active) {
            background: #ffffff;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem 3rem 4rem 3rem;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .page-wrapper {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header {
            margin-bottom: 2.5rem;
            padding-top: 1rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid #ffffff;
            transition: box-shadow 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: var(--shadow-md);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 1.2rem;
            background: #fdfbfb;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        input:focus,
        textarea:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 36, 66, 0.08);
        }

        input::placeholder,
        textarea::placeholder {
            color: #c7c7cc;
        }

        textarea {
            resize: vertical;
            min-height: 140px;
            line-height: 1.6;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 16px rgba(255, 36, 66, 0.25);
            white-space: nowrap;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 36, 66, 0.35);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: #d1d1d6;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
            color: #ffffff;
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--text-main);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #fdfbfb;
            color: var(--primary);
            border-color: rgba(255, 36, 66, 0.2);
            box-shadow: 0 6px 16px rgba(255, 36, 66, 0.1);
        }

        /* Prompt Items */
        .prompt-item {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .prompt-item:hover {
            border-color: rgba(255, 36, 66, 0.2);
            box-shadow: var(--shadow-md);
        }

        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed var(--border);
        }

        .prompt-header h3 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--text-main);
            font-weight: 700;
        }

        .prompt-type-badge {
            background: rgba(255, 36, 66, 0.08);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.2rem;
            margin: 1.5rem 0;
        }

        .media-item {
            aspect-ratio: 1;
            background: #f8f9fb;
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            text-align: center;
            position: relative;
            border: 1px solid var(--border);
            color: var(--text-muted);
            overflow: hidden;
            padding: 12px;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .media-item:hover {
            border-color: var(--primary);
            background: #fff;
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(255, 36, 66, 0.1);
        }

        .cover-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, var(--primary), #ff6b81);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(255, 36, 66, 0.3);
        }

        /* Status Banner */
        .status-banner {
            margin-top: 1.5rem;
            padding: 1.2rem 1.5rem;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            animation: fadeIn 0.3s ease-out;
        }

        .status-success {
            background: rgba(52, 199, 89, 0.1);
            color: #248a3d;
            border: 1px solid rgba(52, 199, 89, 0.2);
        }

        .status-error {
            background: rgba(255, 59, 48, 0.1);
            color: #d71511;
            border: 1px solid rgba(255, 59, 48, 0.2);
        }

        .processing-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('publish');
            const [config, setConfig] = useState({ apiKey: '', baseUrl: '', modelName: '' });
            const [prompts, setPrompts] = useState([]);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [testStatus, setTestStatus] = useState(null); // { success: boolean, message: string }
            const [imagesPath, setImagesPath] = useState('');
            const [extractFramesCount, setExtractFramesCount] = useState(8);

            useEffect(() => {
                const savedPath = localStorage.getItem('redbook_images_path');
                if (savedPath) setImagesPath(savedPath);
                const savedFramesCount = localStorage.getItem('redbook_frames_count');
                if (savedFramesCount) setExtractFramesCount(parseInt(savedFramesCount, 10));
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    const cfg = await axios.get('/api/config');
                    if (cfg.data) setConfig(cfg.data);
                    const pms = await axios.get('/api/prompts');
                    setPrompts(pms.data);
                } catch (e) { console.error(e); }
            };

            const handleSaveConfig = async (e) => {
                e.preventDefault();
                await axios.post('/api/config', config);
                alert('配置保存成功！');
            };

            const handleUpdatePrompt = async (p) => {
                await axios.post('/api/prompts', p);
                alert('模板更新成功！');
                fetchData();
            };

            const handleTestConnection = async () => {
                setLoading(true);
                setTestStatus(null);
                try {
                    const res = await axios.post('/api/test-connection', config);
                    setTestStatus({ success: true, message: res.data.message || '连接成功，配置已生效！' });
                } catch (e) {
                    setTestStatus({ success: false, message: e.response?.data?.error || '连接失败，请检查配置信息' });
                } finally {
                    setLoading(false);
                }
            };

            const handleSelectFolder = async () => {
                try {
                    const res = await axios.get('/api/select-folder');
                    if (res.data && res.data.path) {
                        setImagesPath(res.data.path);
                    }
                } catch (e) {
                    console.error('Failed to select folder:', e);
                }
            };

            const handleProcess = async () => {
                setLoading(true);
                setResult(null);

                // Save path to local storage when process starts
                localStorage.setItem('redbook_images_path', imagesPath);
                localStorage.setItem('redbook_frames_count', extractFramesCount.toString());

                try {
                    const res = await axios.post('/api/process', { imagesPath, extractFramesCount });
                    setResult(res.data);
                } catch (e) {
                    alert(e.response?.data?.error || '识别失败，请检查服务日志');
                } finally {
                    setLoading(false);
                }
            };

            const handlePublish = async () => {
                try {
                    await axios.post('/api/publish', { ...result, imagesPath });
                    alert('✨ 发布指令已发送，请在弹出的浏览器中核对发布信息~');
                } catch (e) { alert('发布失败，请检查控制台或后端服务！'); }
            };

            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="logo-container">
                            <div className="logo-icon">红</div>
                            <h2>小红书 AI 助手</h2>
                        </div>
                        <div className={`nav-item ${activeTab === 'publish' ? 'active' : ''}`} onClick={() => setActiveTab('publish')}>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            发布中心
                        </div>
                        <div className={`nav-item ${activeTab === 'config' ? 'active' : ''}`} onClick={() => setActiveTab('config')}>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                            AI 引擎配置
                        </div>
                        <div className={`nav-item ${activeTab === 'prompts' ? 'active' : ''}`} onClick={() => setActiveTab('prompts')}>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            提示词模板
                        </div>
                    </div>

                    <div className="main-content">
                        {activeTab === 'config' && (
                            <div className="page-wrapper">
                                <div className="page-header">
                                    <h1>AI 引擎配置</h1>
                                    <p>设置您的大模型 API 参数以启用智能生文功能</p>
                                </div>
                                <div className="glass-card">
                                    <form onSubmit={handleSaveConfig}>
                                        <div className="form-group">
                                            <label>API Key</label>
                                            <input type="password" value={config.apiKey || ''} onChange={e => setConfig({ ...config, apiKey: e.target.value })} placeholder="sk-..." />
                                        </div>
                                        <div className="form-group">
                                            <label>Base URL</label>
                                            <input type="text" value={config.baseUrl || ''} onChange={e => setConfig({ ...config, baseUrl: e.target.value })} placeholder="https://api.openai.com/v1" />
                                        </div>
                                        <div className="form-group">
                                            <label>Model Name</label>
                                            <input type="text" value={config.modelName || ''} onChange={e => setConfig({ ...config, modelName: e.target.value })} placeholder="gpt-4o / claude-3" />
                                        </div>
                                        <div style={{ display: 'flex', gap: '1rem', marginTop: '2.5rem' }}>
                                            <button className="btn" type="submit">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                                                保存全部配置
                                            </button>
                                            <button className="btn btn-secondary" type="button" onClick={handleTestConnection} disabled={loading}>
                                                {loading ? (
                                                    <><svg className="processing-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>连接诊断中...</>
                                                ) : (
                                                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>测试连通性</>
                                                )}
                                            </button>
                                        </div>
                                        {testStatus && (
                                            <div className={`status-banner ${testStatus.success ? 'status-success' : 'status-error'}`}>
                                                {testStatus.success ? (
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                                ) : (
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                                                )}
                                                {testStatus.message}
                                            </div>
                                        )}
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'prompts' && (
                            <div className="page-wrapper">
                                <div className="page-header">
                                    <h1>提示词策略</h1>
                                    <p>针对不同素材类型定制 AI 的视觉识别与文案创作策略</p>
                                </div>
                                {prompts.map(p => (
                                    <div key={p.id} className="prompt-item">
                                        <div className="prompt-header">
                                            <h3>{p.name}</h3>
                                            <span className="prompt-type-badge">{p.type === 'image' ? '🖼️ 图片素材解析' : '🎞️ 视频素材解析'}</span>
                                        </div>
                                        <div className="form-group">
                                            <label style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span>System Prompt 角色设定</span>
                                                <small style={{ color: 'var(--text-muted)', fontWeight: 'normal' }}>指导 AI 输出的内容口吻</small>
                                            </label>
                                            <textarea rows="4" value={p.systemPrompt} onChange={e => setPrompts(prompts.map(pr => pr.id === p.id ? { ...pr, systemPrompt: e.target.value } : pr))} placeholder="你是一个深谙小红书爆款文案的专家..." />
                                        </div>
                                        <div className="form-group">
                                            <label style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span>User Prompt 指令细则</span>
                                                <small style={{ color: 'var(--text-muted)', fontWeight: 'normal' }}>描述具体的任务要求和格式化输出</small>
                                            </label>
                                            <textarea rows="5" value={p.userPrompt} onChange={e => setPrompts(prompts.map(pr => pr.id === p.id ? { ...pr, userPrompt: e.target.value } : pr))} placeholder="请根据上述提供的素材，分析亮点并生成排版美观的笔记..." />
                                        </div>
                                        <div style={{ textAlign: 'right', marginTop: '2rem' }}>
                                            <button className="btn" onClick={() => handleUpdatePrompt(p)}>
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                                                更新当前模板
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'publish' && (
                            <div className="page-wrapper">
                                <div className="page-header">
                                    <h1>内容发布台</h1>
                                    <p>自动扫描本地素材，依托大模型一键生成爆款图文</p>
                                </div>
                                <div className="glass-card" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1.5rem', background: 'linear-gradient(to right, #ffffff, #fffafa)', borderColor: '#ffecec' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '1.2rem' }}>
                                        <div style={{ width: '56px', height: '56px', borderRadius: '16px', background: 'rgba(255, 36, 66, 0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--primary)' }}>
                                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                        </div>
                                        <div>
                                            <h3 style={{ margin: '0 0 6px 0', fontSize: '1.15rem', color: 'var(--text-main)' }}>工作区素材扫描</h3>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
                                                <span style={{ color: 'var(--text-muted)', fontSize: '0.95rem' }}>监听目录:</span>
                                                <input
                                                    type="text"
                                                    value={imagesPath}
                                                    onChange={(e) => setImagesPath(e.target.value)}
                                                    placeholder="留空则读取根目录下的 images 文件夹"
                                                    style={{
                                                        flex: 1,
                                                        minWidth: '220px',
                                                        padding: '8px 12px',
                                                        fontSize: '0.9rem',
                                                        background: '#f0f0f5',
                                                        border: '1px solid #e0e0e0',
                                                        borderRight: 'none',
                                                        borderRadius: '6px 0 0 6px',
                                                        color: '#444'
                                                    }}
                                                />
                                                <button
                                                    onClick={handleSelectFolder}
                                                    style={{
                                                        padding: '8px 14px',
                                                        background: 'var(--primary)',
                                                        color: 'white',
                                                        border: '1px solid var(--primary)',
                                                        borderRadius: '0 6px 6px 0',
                                                        cursor: 'pointer',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'center',
                                                        marginLeft: '-8px',
                                                        transition: 'background 0.2s',
                                                        height: '100%',
                                                        zIndex: 2
                                                    }}
                                                    onMouseOver={(e) => e.currentTarget.style.background = 'var(--primary-hover)'}
                                                    onMouseOut={(e) => e.currentTarget.style.background = 'var(--primary)'}
                                                    title="选择文件夹"
                                                >
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                                </button>
                                            </div>
                                            <div style={{ marginTop: '12px', padding: '10px 14px', background: '#fff9e6', borderRadius: '8px', borderLeft: '4px solid #ffc107', fontSize: '0.86rem', color: '#665000', display: 'flex', flexDirection: 'column', gap: '8px', lineHeight: '1.5' }}>
                                                <div>
                                                    <span style={{ fontWeight: 'bold' }}>💡 素材放置说明：</span><br />
                                                    <span style={{ display: 'inline-block', marginTop: '2px' }}>
                                                        • <b>图文发帖：</b> 请确保所选目录中<span style={{ color: '#d32f2f' }}>只放入您需要 AI 分析和发布的对应图片</span>。<br />
                                                        • <b>视频发帖：</b> 请确保所选目录中<span style={{ color: '#d32f2f' }}>仅包含那唯一一个视频</span>文件，以便 AI 集中精力理解视频内容。
                                                    </span>
                                                </div>
                                                <div style={{ marginTop: '2px', paddingTop: '8px', borderTop: '1px dashed #ffd54f' }}>
                                                    <span style={{ fontWeight: 'bold' }}>⚠️ 视频分析提示：</span>若目录内包含视频，系统将转为截取连续画面模式。建议视频控制在 1 分钟左右以保摘要准度。
                                                </div>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                    <span>您可以自行设定对于视频提取的静画抽帧数：</span>
                                                    <input
                                                        type="number"
                                                        min="1" max="50"
                                                        value={extractFramesCount}
                                                        onChange={(e) => setExtractFramesCount(e.target.value)}
                                                        style={{ width: '60px', padding: '4px 8px', borderRadius: '4px', border: '1px solid #ccc', textAlign: 'center' }}
                                                    /> 张
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <button className="btn" onClick={handleProcess} disabled={loading} style={{ padding: '1.2rem 2.5rem', fontSize: '1.05rem', marginTop: '10px' }}>
                                        {loading ? (
                                            <><svg className="processing-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>AI 视觉解析提取中...</>
                                        ) : (
                                            <><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>开始智能生文</>
                                        )}
                                    </button>
                                </div>

                                {result && (
                                    <div className="glass-card" style={{ animation: 'fadeIn 0.6s cubic-bezier(0.165, 0.84, 0.44, 1)' }}>
                                        <h3 style={{ margin: '0 0 2rem 0', display: 'flex', alignItems: 'center', gap: '10px', fontSize: '1.3rem' }}>
                                            <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '32px', height: '32px', borderRadius: '50%', background: 'linear-gradient(135deg, var(--primary), #ff6b81)', color: 'white' }}>
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                                            </span>
                                            灵感创作已生成
                                        </h3>
                                        <div className="form-group">
                                            <label>笔记吸睛标题 ✨</label>
                                            <input type="text" value={result.suggestedTitle} onChange={e => setResult({ ...result, suggestedTitle: e.target.value })} style={{ fontWeight: 600, fontSize: '1.1rem', padding: '1.2rem' }} />
                                        </div>
                                        <div className="form-group">
                                            <label>爆款正文 (支持丰富的 Emoji 排版) 📝</label>
                                            <textarea rows="12" value={result.suggestedContent} onChange={e => setResult({ ...result, suggestedContent: e.target.value })} style={{ fontSize: '1rem', lineHeight: '1.8' }} />
                                        </div>
                                        <div className="form-group">
                                            <label>流量话题标签 #️⃣</label>
                                            <input type="text" value={result.tags.join(' ')} onChange={e => setResult({ ...result, tags: e.target.value.split(' ') })} placeholder="输入话题使用空格分隔" style={{ color: 'var(--primary)', fontWeight: 500 }} />
                                            <small style={{ color: 'var(--text-muted)', display: 'block', marginTop: '8px' }}>建议添加 5-10 个精准标签以获得更多系统推荐流量</small>
                                        </div>
                                        <div className="form-group" style={{ marginTop: '2.5rem' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                装配媒体墙 📸
                                            </label>
                                            <div className="media-grid">
                                                {result.files.map((f, i) => (
                                                    <div key={i} className="media-item">
                                                        {i === 0 && <span className="cover-tag">👑 笔记封面</span>}
                                                        <div style={{ marginBottom: '12px', color: 'var(--primary)' }}>
                                                            {f.endsWith('.mp4') ?
                                                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg> :
                                                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                                            }
                                                        </div>
                                                        <span style={{ fontSize: '0.8rem', lineHeight: 1.3 }}>{f.split(/[/\\]/).pop()}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <button className="btn" style={{ width: '100%', padding: '1.4rem', fontSize: '1.15rem', marginTop: '2rem', letterSpacing: '2px' }} onClick={handlePublish}>
                                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                                            一键发布至小红书
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
